apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: failure-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "failuredb"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: JAVA_APP_URL
          value: "http://failure-app-service:8080"
        - name: OLLAMA_URL
          value: "http://ollama-service:11434"
        - name: QDRANT_URL
          value: "http://qdrant-service:6333"
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: failure-monitoring
spec:
  selector:
    app: dashboard
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
  type: NodePort
