apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-checker
  namespace: failure-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: failure-monitoring
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: health-checker-pod-reader
  namespace: failure-monitoring
subjects:
- kind: ServiceAccount
  name: health-checker
  namespace: failure-monitoring
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-checker
  namespace: failure-monitoring
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: health-checker
          containers:
          - name: health-checker
            image: health-checker:latest
            imagePullPolicy: Never
            env:
            - name: JAVA_APP_URL
              value: "http://failure-app-service:8080"
            - name: OLLAMA_URL
              value: "http://ollama-service:11434"
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_NAME
              value: "failuredb"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: NAMESPACE
              value: "failure-monitoring"
          restartPolicy: OnFailure
